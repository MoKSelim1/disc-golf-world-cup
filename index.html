<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Test App</title>
    <style>
        /* Optional: Basic styling */
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            cursor: pointer;
            margin-top: 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #message {
            margin-top: 20px;
            font-size: 1.1em;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>My Simple Test App</h1>
        
        <p id="message">Click the button below!</p>
        
        <button id="changeButton">Click Me</button>
    </div>

    <script>
        // Get references to the button and the message paragraph
        const changeButton = document.getElementById('changeButton');
        const messageParagraph = document.getElementById('message');

        // Add an event listener to the button
        changeButton.addEventListener('click', function() {
            // Change the text content of the paragraph when the button is clicked
            messageParagraph.textContent = 'Yay! The button was clicked and the JS worked!';
            // Optional: Change button text too
            changeButton.textContent = 'Clicked!'; 
        });
    </script>
</body>
</html>
