<svg xmlns="http://www.w3.org/2000/svg" width="430" height="1180" viewBox="0 0 430 1180" role="img" aria-labelledby="title desc">
  <title id="title">Mobile dashboard preview</title>
  <desc id="desc">A mobile preview of the dashboard with stacked hero, progress cards, group filters, standings rows, and next match card.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef5ee"/><stop offset="1" stop-color="#eaf2f5"/></linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#102f25"/><stop offset=".55" stop-color="#18553f"/><stop offset="1" stop-color="#1d5a80"/></linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#256b4f"/><stop offset="1" stop-color="#225f87"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1b261e" flood-opacity=".12"/></filter>
    <style>
      .font{font-family:Inter,Segoe UI,sans-serif}.heavy{font-weight:900}.bold{font-weight:800}.muted{fill:#69756d}.ink{fill:#202721}.white{fill:white}.label{font-size:12px;font-weight:900;text-transform:uppercase}.card{fill:white;stroke:#d9ddd6;filter:url(#shadow)}.soft{fill:#f8faf7;stroke:#d9ddd6}.small{font-size:14px}.med{font-size:18px}.big{font-size:40px;letter-spacing:-2px}
    </style>
  </defs>
  <rect width="430" height="1180" fill="url(#pageBg)"/>
  <g class="font" transform="translate(16 22)">
    <text class="label heavy muted" x="0" y="0">Tournament hub</text>
    <text class="heavy ink" x="0" y="34" font-size="28">Disc Golf World Cup</text>
    <g transform="translate(0 58)">
      <rect width="398" height="372" rx="18" fill="url(#hero)" filter="url(#shadow)"/>
      <circle cx="64" cy="68" r="96" fill="#b7e4c7" opacity=".18"/>
      <text class="label heavy" x="22" y="42" fill="#b7e4c7">Live qualifying picture</text>
      <text class="heavy white big" x="22" y="98">Disc Golf</text>
      <text class="heavy white big" x="22" y="142">World Cup</text>
      <text class="bold" fill="rgba(255,255,255,.78)" x="22" y="178" font-size="15">Current stage, scorecard progress,</text>
      <text class="bold" fill="rgba(255,255,255,.78)" x="22" y="200" font-size="15">cut-line drama, and group filters.</text>
      <g transform="translate(22 220)">
        <rect width="92" height="32" rx="16" fill="white" opacity=".14" stroke="white" stroke-opacity=".3"/><text class="white bold small" x="13" y="22">16 Players</text>
        <rect x="102" width="90" height="32" rx="16" fill="white" opacity=".14" stroke="white" stroke-opacity=".3"/><text class="white bold small" x="117" y="22">4 Groups</text>
      </g>
      <g transform="translate(22 272)">
        <rect width="354" height="76" rx="16" fill="white" opacity=".13" stroke="white" stroke-opacity=".24"/>
        <text class="label heavy" x="18" y="26" fill="#b7e4c7">Now showing</text><text class="heavy white med" x="18" y="52">Group Stage</text>
        <rect x="198" y="34" width="34" height="7" rx="4" fill="#c9922a"/><rect x="240" y="34" width="34" height="7" rx="4" fill="white" opacity=".24"/><rect x="282" y="34" width="34" height="7" rx="4" fill="white" opacity=".24"/>
      </g>
    </g>
    <g transform="translate(0 452)">
      <rect class="card" width="398" height="94" rx="16"/><text class="label heavy muted" x="18" y="28">Group Stage</text><text class="heavy ink" x="18" y="62" font-size="28">4/24</text><rect x="132" y="46" width="230" height="8" rx="4" fill="#e8ede7"/><rect x="132" y="46" width="39" height="8" rx="4" fill="url(#bar)"/>
      <rect class="card" y="110" width="398" height="94" rx="16"/><text class="label heavy muted" x="18" y="138">Cut Line Watch</text><text class="heavy ink" x="18" y="172" font-size="28">Group A</text><text class="bold muted small" x="160" y="164">Bubble + chaser</text>
    </g>
    <g transform="translate(0 684)">
      <rect class="card" width="398" height="92" rx="18"/><text class="label heavy muted" x="18" y="30">Interactive dashboard</text><text class="heavy ink med" x="18" y="58">Group Stage Command Center</text>
      <g transform="translate(0 110)">
        <rect width="96" height="36" rx="18" fill="#256b4f"/><text class="white bold small" x="17" y="24">All Groups</text>
        <rect class="soft" x="106" width="86" height="36" rx="18"/><text class="bold muted small" x="124" y="24">Group A</text>
        <rect class="soft" x="202" width="86" height="36" rx="18"/><text class="bold muted small" x="220" y="24">Group B</text>
      </g>
    </g>
    <g transform="translate(0 858)">
      <rect class="card" width="398" height="266" rx="18"/><text class="label heavy muted" x="18" y="30">Live table</text><text class="heavy ink med" x="18" y="58">Group A</text><text class="bold muted small" x="300" y="46">1/6 matches</text>
      <rect x="18" y="76" width="362" height="8" rx="4" fill="#e8ede7"/><rect x="18" y="76" width="60" height="8" rx="4" fill="url(#bar)"/>
      <text class="label heavy muted" x="22" y="112">Seed</text><text class="label heavy muted" x="74" y="112">Player</text><text class="label heavy muted" x="246" y="112">W-L</text><text class="label heavy muted" x="306" y="112">GP</text>
      <rect x="18" y="126" width="362" height="48" rx="9" fill="#eef7f0" stroke="#dce9df"/><circle cx="40" cy="150" r="14" fill="#256b4f"/><text class="white heavy small" x="36" y="155">1</text><text class="heavy ink small" x="66" y="155">🇺🇸 Player 1</text><text class="bold ink small" x="248" y="155">1-0</text><text class="bold ink small" x="314" y="155">1</text><text class="bold ink small" x="350" y="155">54</text>
      <rect x="18" y="184" width="362" height="48" rx="9" fill="#f8faf7" stroke="#dce9df"/><circle cx="40" cy="208" r="14" fill="#256b4f"/><text class="white heavy small" x="36" y="213">2</text><text class="heavy ink small" x="66" y="213">🇨🇦 Player 3</text><text class="bold ink small" x="248" y="213">0-0</text><text class="bold ink small" x="314" y="213">0</text><text class="bold ink small" x="350" y="213">0</text>
      <rect x="18" y="240" width="362" height="1" fill="#d9ddd6"/>
    </g>
  </g>
</svg>
